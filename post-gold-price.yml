name: Post Gold Price to Facebook

on:
  schedule:
    # รันทุก 2 ชั่วโมง ตั้งแต่ 8:00 - 20:00 น. (เวลาไทย = UTC+7)
    # UTC 01:00, 03:00, 05:00, 07:00, 09:00, 11:00, 13:00 = ไทย 08:00, 10:00, 12:00, 14:00, 16:00, 18:00, 20:00
    - cron: '0 1,3,5,7,9,11,13 * * *'
  workflow_dispatch: # รันมือได้จาก GitHub UI

jobs:
  post-gold-price:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run gold price poster
        env:
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
        run: node index.js

      - name: Commit updated last price
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add last_price.json
          git diff --staged --quiet || git commit -m "Update last gold price"
          git push
