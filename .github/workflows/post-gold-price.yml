name: Post Gold Price to Facebook

on:
  schedule:
    - cron: '0 1,3,5,7,9 * * *'
  workflow_dispatch:

jobs:
  post-gold-price:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Commit screenshot before posting (so URL is accessible)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          node -e "
            const { chromium } = require('playwright');
            const fs = require('fs');
            (async () => {
              const browser = await chromium.launch();
              const page = await browser.newPage();
              await page.setViewportSize({ width: 1440, height: 1400 });
              await page.goto('https://chomthong-gold-shop.vercel.app/', { waitUntil: 'networkidle' });
              await page.evaluate(() => { document.body.style.zoom = '0.6'; });
              await page.waitForTimeout(2000);
              const el = await page.\$('.card-body.items-center.text-center');
              const buf = el ? await el.screenshot({ type: 'png' }) : await page.screenshot({ type: 'png' });
              fs.writeFileSync('screenshot.png', buf);
              await browser.close();
              console.log('screenshot saved');
            })();
          "
          git add screenshot.png
          git diff --staged --quiet || git commit -m "Pre-post screenshot update"
          git push

      - name: Run gold price poster
        env:
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
          FB_APP_ID: ${{ secrets.FB_APP_ID }}
          FB_APP_SECRET: ${{ secrets.FB_APP_SECRET }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node index.js

      - name: Commit last price
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add last_price.json
          git diff --staged --quiet || git commit -m "Update last price"
          git push
