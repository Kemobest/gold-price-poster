name: Post Gold Price to Facebook

on:
  schedule:
    # เวลาไทย 9:30, 12:00, 16:00 น. (UTC = ลบ 7 ชั่วโมง)
    - cron: '30 2 * * *'   # 09:30 น. ไทย
    - cron: '0 5 * * *'    # 12:00 น. ไทย
    - cron: '0 9 * * *'    # 16:00 น. ไทย
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'Test mode (ดูรูปอย่างเดียว ไม่โพสต์ Facebook)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  post-gold-price:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run gold price poster
        env:
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
          FB_APP_ID: ${{ secrets.FB_APP_ID }}
          FB_APP_SECRET: ${{ secrets.FB_APP_SECRET }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          TEST_MODE: ${{ github.event.inputs.test_mode || 'false' }}
        run: node index.js

      - name: Commit screenshot and last price
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add screenshot.png last_price.json
          git diff --staged --quiet || git commit -m "Update screenshot and last price"
          git push
